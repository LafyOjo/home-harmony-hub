<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – TenantVault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #faf8f5; color: #1a2e35; }
    .container { text-align: center; padding: 2rem; max-width: 420px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; border-radius: 16px; background: #1a7a6d; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 32px; height: 32px; color: white; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    p { color: #6b7d85; font-size: .95rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button { background: #1a7a6d; color: white; border: none; padding: .75rem 1.5rem; border-radius: 8px; font-size: .95rem; cursor: pointer; font-family: inherit; }
    button:hover { background: #15655a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
